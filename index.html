<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER GRID — Rhythm Stage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap');

        /* ── Variables ───────────────────────────────────────────────────── */
        :root {
            --cyan:   #28f0ff;
            --pink:   #ff3ca6;
            --yellow: #ffe066;
            --purple: #8b5cf6;
            --bg:     #05070d;
            --panel:  rgba(8,14,26,0.92);
            --border: rgba(40,240,255,0.22);
            --text:   #e0f4ff;
            --muted:  rgba(224,244,255,0.5);
        }

        /* ── Reset ───────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: var(--bg);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text);
            font-size: 15px;
        }

        /* Scanlines */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(0,0,0,.05) 3px, rgba(0,0,0,.05) 4px);
        }

        /* ── Canvas layers ────────────────────────────────────────────────── */
        #backgroundCanvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        #gameCanvas        { position: fixed; top: 0; left: 0; z-index: 1; }
        .hidden { display: none !important; }

        /* ── Loading overlay ─────────────────────────────────────────────── */
        #loadingOverlay {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
            background: linear-gradient(180deg, #05070d, #0a0f1f 55%, #05070d);
            pointer-events: none; opacity: 0; transition: opacity .4s;
        }
        #loadingOverlay.visible { opacity: 1; pointer-events: auto; }
        #waitCanvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .wait-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 0 24px; text-align: center; }
        .wait-logo { font: 700 9px 'Press Start 2P', monospace; letter-spacing: .2em; text-transform: uppercase; color: rgba(40,240,255,.5); }
        .wait-title { font: 700 22px 'Press Start 2P', monospace; color: var(--cyan); text-shadow: 0 0 40px rgba(40,240,255,.5); line-height: 1.4; }
        .wait-sub { font: 600 13px 'Rajdhani', sans-serif; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,60,166,.7); }
        .wait-bar-wrap { width: 240px; height: 2px; background: rgba(255,255,255,.08); }
        .wait-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan), var(--pink)); box-shadow: 0 0 12px var(--cyan); transition: width .3s ease; }
        .wait-status { font: 500 12px 'Rajdhani', sans-serif; color: rgba(224,244,255,.45); min-height: 18px; }
        .wait-hint { font: 600 10px 'Rajdhani', sans-serif; letter-spacing: .14em; text-transform: uppercase; color: rgba(40,240,255,.25); }
        .wait-ripple { position: absolute; border-radius: 0; width: 0; height: 0; pointer-events: none; border: 1px solid rgba(40,240,255,.6); transform: translate(-50%,-50%); animation: rippleOut .7s ease-out forwards; }
        @keyframes rippleOut { to { width: 160px; height: 160px; opacity: 0; } }

        /* ── HUD (in-game score panel) ───────────────────────────────────── */
        #score {
            position: fixed; top: 16px; right: 16px; z-index: 3;
            padding: 10px 14px;
            background: rgba(5,7,13,.9);
            border: 1px solid var(--border);
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
            min-width: 220px; max-width: 300px;
            font-weight: 700; letter-spacing: .04em;
            overflow: visible;
        }
        .hud-topline { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .score-stack { min-width: 0; }
        .score-stack small { display: block; font: 700 8px 'Press Start 2P', monospace; letter-spacing: .12em; text-transform: uppercase; color: rgba(40,240,255,.5); margin-bottom: 4px; }
        .score-main { font: 700 24px 'Press Start 2P', monospace; color: var(--cyan); text-shadow: 0 0 14px rgba(40,240,255,.4); }
        .hud-top-actions { display: flex; gap: 6px; align-items: center; }
        .score-aux { text-align: right; }
        .score-aux small { display: block; font: 700 8px 'Press Start 2P', monospace; letter-spacing: .1em; text-transform: uppercase; color: rgba(40,240,255,.5); margin-bottom: 4px; }
        .score-aux strong { display: block; font: 700 16px 'Press Start 2P', monospace; color: var(--yellow); }
        .score-modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 6px; margin-top: 8px; }
        .score-meter { height: 2px; background: rgba(255,255,255,.06); margin-top: 8px; }
        .score-meter-fill { height: 100%; width: 38%; background: linear-gradient(90deg, var(--cyan), var(--yellow)); }
        .hud-module { padding: 8px 10px; background: rgba(40,240,255,.03); border: 1px solid rgba(40,240,255,.1); }
        .hud-module small { display: block; font: 700 8px 'Press Start 2P', monospace; letter-spacing: .1em; text-transform: uppercase; color: rgba(40,240,255,.45); margin-bottom: 3px; }
        .hud-module strong { display: block; font: 700 12px 'Press Start 2P', monospace; color: var(--text); }
        .hud-module.emphasis strong { color: var(--yellow); }
        .hud-module.alert strong { color: var(--pink); }
        #runState[data-state="invalid"] strong { color: var(--pink); }
        .debug-strip { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 4px; margin-top: 6px; font: 700 8px 'Press Start 2P', monospace; color: rgba(40,240,255,.5); }
        .debug-strip span { padding: 5px 6px; background: rgba(40,240,255,.03); border: 1px solid rgba(40,240,255,.07); }
        .debug-strip b { color: var(--text); }
        .debug-strip span.warn { border-color: rgba(255,60,166,.4); background: rgba(255,60,166,.08); }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        button {
            padding: 9px 18px;
            background: rgba(5,7,13,.85);
            border: 1px solid rgba(40,240,255,.35);
            color: var(--cyan);
            cursor: pointer; transition: all .18s;
            font: 700 9px 'Press Start 2P', monospace;
            letter-spacing: .04em; border-radius: 0;
        }
        button:hover:not(:disabled) { background: rgba(40,240,255,.1); box-shadow: 0 0 14px rgba(40,240,255,.25); }
        button:disabled { opacity: .3; cursor: not-allowed; }
        button.primary { border-color: var(--cyan); color: var(--cyan); }
        button.accent  { border-color: var(--yellow); color: var(--yellow); }
        button.danger  { border-color: var(--pink); color: var(--pink); }
        .hud-control-btn { min-height: 34px; min-width: 70px; padding: 6px 10px; font-size: 8px; }

        /* ── Setup screen (#uploadContainer) ─────────────────────────────── */
        #uploadContainer {
            position: fixed; inset: 0; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        .cyber-setup {
            width: 100%; max-width: 760px;
            background: rgba(6,10,20,.92);
            border: 1px solid rgba(40,240,255,.2);
            clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
            padding: 28px 32px 24px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Title bar */
        .setup-title {
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(40,240,255,.12);
            padding-bottom: 14px;
        }
        .setup-title-text {
            font: 700 14px 'Press Start 2P', monospace;
            color: var(--cyan);
            text-shadow: 0 0 24px rgba(40,240,255,.4);
            letter-spacing: .06em;
        }
        .setup-title-tag {
            font: 700 8px 'Press Start 2P', monospace;
            color: rgba(40,240,255,.4);
            letter-spacing: .1em;
            margin-left: auto;
        }

        /* Input row */
        .setup-inputs {
            display: flex; flex-direction: column; gap: 10px;
        }
        .input-row {
            display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap;
        }
        .input-row.main { gap: 8px; }

        input[type="url"], select {
            background: rgba(4,8,16,.9);
            border: 1px solid rgba(40,240,255,.2);
            color: var(--text);
            font: 600 13px 'Rajdhani', sans-serif;
            padding: 9px 12px;
            border-radius: 0;
            outline: none;
            transition: border-color .18s;
            min-height: 40px;
        }
        input[type="url"] { flex: 1; min-width: 200px; }
        input[type="url"]::placeholder { color: rgba(224,244,255,.3); }
        input[type="url"]:focus, select:focus { border-color: rgba(40,240,255,.5); }
        select { cursor: pointer; }
        select option { background: #05070d; }

        /* File upload */
        .file-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 9px 16px; min-height: 40px;
            background: rgba(5,7,13,.85);
            border: 1px solid rgba(40,240,255,.35);
            color: var(--cyan);
            font: 700 8px 'Press Start 2P', monospace;
            letter-spacing: .04em; cursor: pointer; white-space: nowrap;
            transition: all .18s; position: relative;
        }
        .file-btn:hover { background: rgba(40,240,255,.08); }
        .file-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* Action buttons row */
        .action-row {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .action-row button { flex: 1; min-width: 120px; }

        /* Status panel */
        #statusText {
            padding: 10px 14px;
            background: rgba(4,8,16,.6);
            border: 1px solid rgba(40,240,255,.1);
            font: 600 13px 'Rajdhani', sans-serif;
            min-height: 44px;
        }
        .success-message { color: var(--cyan); }
        .error-message   { color: var(--pink); }
        .loading-message { color: var(--yellow); }
        .note-message    { color: rgba(224,244,255,.55); }

        /* Ready summary */
        #readySummary {
            display: none; /* shown by JS */
            padding: 8px 14px;
            border: 1px solid rgba(40,240,255,.1);
            background: rgba(4,8,16,.5);
            font: 600 12px 'Rajdhani', sans-serif;
            color: var(--muted);
            letter-spacing: .04em;
        }

        /* ── Pause overlay ────────────────────────────────────────────────── */
        #pauseOverlay {
            position: fixed; inset: 0; z-index: 4;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
            background:
                radial-gradient(circle at 50% 45%, rgba(40,240,255,.06), transparent 20%),
                linear-gradient(180deg, rgba(5,7,13,.65), rgba(5,7,13,.75));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #pauseOverlayText {
            font: 700 28px 'Press Start 2P', monospace;
            color: var(--cyan);
            text-shadow: 0 0 40px rgba(40,240,255,.4), 0 0 8px rgba(0,0,0,.8);
            padding: 12px 20px;
            border: 1px solid rgba(40,240,255,.2);
            background: rgba(5,7,13,.35);
            letter-spacing: .08em;
        }
        #pauseOverlaySubtext {
            font: 600 13px 'Rajdhani', sans-serif;
            color: rgba(224,244,255,.6);
            padding: 10px 18px;
            border: 1px solid rgba(40,240,255,.1);
            background: rgba(5,7,13,.3);
        }
        #overlayResumeBtn { margin-top: 4px; min-width: 160px; }

        /* ── Live player holder ───────────────────────────────────────────── */
        #livePlayerHolder {
            position: fixed; left: 16px; bottom: 16px; z-index: 3;
            background: rgba(5,7,13,.88);
            padding: 10px;
            border: 1px solid rgba(40,240,255,.14);
        }
        #liveAudio { width: 280px; }

        /* ── Responsive ──────────────────────────────────────────────────── */
        @media (max-width: 860px) {
            .cyber-setup { padding: 20px 18px 18px; }
            .setup-title-text { font-size: 10px; }
        }
        @media (max-width: 600px) {
            .cyber-setup { clip-path: none; }
            .input-row { flex-direction: column; }
            .action-row button { min-width: 100px; }
            #score { min-width: 0; width: calc(100vw - 32px); }
            .score-main { font-size: 18px; }
        }
    </style>
</head>
<body>
    <canvas id="backgroundCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <!-- ── Loading overlay ── -->
    <div id="loadingOverlay">
        <canvas id="waitCanvas"></canvas>
        <div class="wait-inner">
            <div class="wait-logo">CYBER GRID · Rhythm Engine</div>
            <div class="wait-title">ANALYZING</div>
            <div class="wait-sub">Detecting BPM &amp; chart structure</div>
            <div class="wait-bar-wrap"><div class="wait-bar-fill" id="waitBarFill"></div></div>
            <div class="wait-status" id="waitStatusText"></div>
            <div class="wait-hint">Processing audio — please wait</div>
        </div>
    </div>

    <!-- ── In-game HUD ── -->
    <div id="score">
        <div class="hud-topline">
            <div class="score-stack">
                <div class="score-main" id="scoreValue">000000</div>
            </div>
            <div class="hud-top-actions">
                <div class="score-aux">
                    <strong id="comboValue" style="display:none">0x</strong>
                </div>
                <button id="hudPauseBtn" class="hud-control-btn" aria-label="Pause">II</button>
            </div>
        </div>
        <div style="display:none;">
            <strong id="hudMode">CASUAL</strong>
            <strong id="hudDifficulty">NORMAL</strong>
            <strong id="hudAccuracy">--</strong>
            <div id="runState" data-state="stable"><strong id="hudRunState">STABLE</strong></div>
            <div class="score-meter"><div class="score-meter-fill" id="scoreMeterFill"></div></div>
            <div id="debugStrip" class="debug-strip hidden">
                <span>Clock <b id="debugGameClock">0.00</b></span>
                <span>Player <b id="debugPlayerClock">0.00</b></span>
                <span>Chart <b id="debugChartProgress">0/0</b></span>
                <span>Notes <b id="debugActiveNotes">0</b></span>
                <span>Group <b id="debugGroupState">--</b></span>
                <span>Playback <b id="debugPlaybackState">--</b></span>
                <span>Diag <b id="debugDiagState">--</b></span>
                <span id="debugReviewScoreWrap">Review <b id="debugReviewScore">--</b></span>
                <span id="debugReviewStateWrap">Flags <b id="debugReviewState">--</b></span>
            </div>
        </div>
    </div>

    <!-- ── Setup screen ── -->
    <div id="uploadContainer">
        <div class="cyber-setup">
            <!-- Title bar -->
            <div class="setup-title">
                <div class="setup-title-text">CYBER GRID</div>
                <div class="setup-title-tag">RHYTHM STAGE v2</div>
            </div>

            <!-- Inputs -->
            <div class="setup-inputs">
                <input type="file" id="audioUpload" accept="audio/*" style="display:none" aria-hidden="true">

                <!-- URL + quick selects -->
                <div class="input-row main">
                    <input id="youtubeUrl" type="url" placeholder="Paste YouTube / Bilibili URL">
                    <select id="difficultySelect">
                        <option value="easy">EASY</option>
                        <option value="normal" selected>NORMAL</option>
                        <option value="hard">HARD</option>
                    </select>
                    <select id="playModeSelect">
                        <option value="casual" selected>CASUAL</option>
                        <option value="strict">STRICT</option>
                    </select>
                </div>

                <!-- Advanced selects -->
                <div class="input-row">
                    <select id="analysisStrategySelect">
                        <option value="auto" selected>AUTO STRATEGY</option>
                        <option value="full">FORCE FULL</option>
                        <option value="segmented">FORCE SEGMENTED</option>
                    </select>
                    <select id="chartDensitySelect">
                        <option value="relaxed">RELAXED DENSITY</option>
                        <option value="normal" selected>NORMAL DENSITY</option>
                        <option value="dense">DENSE DENSITY</option>
                    </select>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="action-row">
                <button id="analyzeYoutube" class="primary">▶ ANALYZE LINK</button>
                <button id="startGame" class="accent" disabled>▶ START GAME</button>
                <button id="cancelAnalyze" class="danger" disabled>✕ CANCEL</button>
                <button id="pauseGameBtn" disabled>⏸ PAUSE</button>
                <button id="resumeGameBtn" disabled style="display:none;">▶ RESUME</button>
            </div>

            <!-- Status -->
            <div id="statusText"></div>
        </div>
    </div>

    <!-- ── Pause overlay ── -->
    <div id="pauseOverlay" class="hidden">
        <div id="pauseOverlayText">PAUSED</div>
        <div id="pauseOverlaySubtext">Resume will count down 3 · 2 · 1</div>
        <button id="overlayResumeBtn" class="primary">▶ RESUME</button>
    </div>

    <!-- ── Live player ── -->
    <div id="livePlayerHolder" class="hidden">
        <div id="ytPlayer"></div>
        <audio id="liveAudio" playsinline crossorigin="anonymous"></audio>
    </div>

    <script>
        (function () {
            var c = window.crypto = window.crypto || window.msCrypto || {};
            if (typeof c.randomUUID !== 'function') {
                c.randomUUID = function () {
                    var bytes = new Uint8Array(16);
                    if (typeof c.getRandomValues === 'function') {
                        c.getRandomValues(bytes);
                    } else {
                        for (var i = 0; i < bytes.length; i++) bytes[i] = Math.floor(Math.random() * 256);
                    }
                    bytes[6] = (bytes[6] & 15) | 64;
                    bytes[8] = (bytes[8] & 63) | 128;
                    var hex = Array.from(bytes, function (b) { return b.toString(16).padStart(2, '0'); });
                    return [hex.slice(0,4).join(''), hex.slice(4,6).join(''), hex.slice(6,8).join(''), hex.slice(8,10).join(''), hex.slice(10,16).join('')].join('-');
                };
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="rgb-effect.js?v=20260324a"></script>
    <script src="default-songs.js?v=20260307a"></script>
    <script src="music-api.js?v=20260307a"></script>
    <script src="clock-controller.js?v=20260312a"></script>
    <script src="run-orchestrator.js?v=20260312a"></script>
    <script src="chart-runtime.js?v=20260313b"></script>
    <script src="run-completion.js?v=20260312a"></script>
    <script src="playback-controller.js?v=20260312a"></script>
    <script src="chart-policy.js?v=20260313h"></script>
    <script src="chart-reviewer.js?v=20260313c"></script>
    <script src="path-templates.js?v=20260313c"></script>
    <script src="game.js?v=20260324a"></script>
    <script src="youtube-client.js?v=20260324a"></script>
</body>
</html>
