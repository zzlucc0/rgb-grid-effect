<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Grid Rhythm Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        #backgroundCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #uploadContainer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(13, 111, 28, 0.5);
            border: 1px solid rgba(25, 163, 54, 0.3);
        }
        #uploadContainer h2 {
            color: #19A336;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        #uploadContainer.hidden {
            display: none;
        }
        #statusText {
            margin: 15px 0;
            min-height: 30px;
        }
        .success-message {
            color: #19A336;
            padding: 10px;
            background: rgba(13, 111, 28, 0.15);
            border-radius: 5px;
            border: 1px solid rgba(25, 163, 54, 0.3);
        }
        .error-message {
            color: #ff6b6b;
            padding: 10px;
            background: rgba(255, 107, 107, 0.15);
            border-radius: 5px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .loading-message {
            color: #e0e0e0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #score {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2;
            font-size: 24px;
            color: #19A336;
            text-shadow: 0 0 5px rgba(13, 111, 28, 0.7);
        }
        /* Button styles moved below */
        .file-upload {
            position: relative;
            display: inline-block;
            margin: 10px;
        }
        .file-upload-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #0D6F1C;
            border: 1px solid #19A336;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .file-upload-btn:hover {
            background: #19A336;
            box-shadow: 0 3px 7px rgba(0, 0, 0, 0.5);
        }
        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        /* Button styling */
        button {
            padding: 10px 20px;
            background: #19A336;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            font-size: 16px;
        }
        button:hover {
            background: #0D6F1C;
            box-shadow: 0 3px 7px rgba(0, 0, 0, 0.5);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.7;
        }
        /* Message styles are already defined above */
        .info-message {
            color: #ffffff;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }
        .note-message {
            color: #19A336;
            background: rgba(13, 111, 28, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(25, 163, 54, 0.2);
            margin-top: 10px;
        }
    
        #livePlayerHolder { position: fixed; left: 20px; bottom: 20px; z-index: 3; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; }
        #livePlayerHolder.hidden { display:none; }
        #liveAudio { width: 320px; }
    
        body {
            background:
                radial-gradient(circle at 20% 10%, rgba(84,241,255,0.12), transparent 20%),
                radial-gradient(circle at 82% 18%, rgba(255,120,188,0.10), transparent 22%),
                linear-gradient(180deg, #04070d, #0a0f17 45%, #05070b);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        #score {
            top: 18px;
            right: 18px;
            min-width: 160px;
            text-align: right;
            padding: 14px 18px;
            background: linear-gradient(180deg, rgba(12,18,28,.84), rgba(5,8,12,.7));
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 18px;
            color: #dffcff;
            box-shadow: 0 18px 60px rgba(0,0,0,.45), inset 0 0 18px rgba(84,241,255,.06);
            text-shadow: 0 0 18px rgba(84,241,255,.28);
            font-weight: 700;
            letter-spacing: .04em;
        }
        #uploadContainer {
            background: linear-gradient(180deg, rgba(7,11,18,.90), rgba(8,11,18,.74));
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            box-shadow: 0 30px 90px rgba(0,0,0,.46), inset 0 0 48px rgba(84,241,255,.04);
            backdrop-filter: blur(24px);
            min-width: 720px;
        }
        #uploadContainer h2 {
            color: #e9fdff;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-size: 28px;
        }
        #youtubeUrl, #difficultySelect, #playModeSelect {
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 0 0 1px rgba(84,241,255,.08);
        }
        button {
            background: linear-gradient(180deg, #182734, #0e1722);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(0,0,0,.28), inset 0 0 18px rgba(84,241,255,.05);
        }
        button:hover {
            background: linear-gradient(180deg, #21384a, #132230);
        }
        .note-message, .info-message, .loading-message, .success-message, .error-message {
            border-radius: 14px;
        }
        #pauseOverlay {
            background:
                radial-gradient(circle at 50% 50%, rgba(84,241,255,.08), transparent 20%),
                linear-gradient(180deg, rgba(4,7,13,.92), rgba(2,4,9,.94));
            backdrop-filter: blur(18px);
        }
        #pauseOverlayText {
            font-size: 46px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #f5fdff;
            text-shadow: 0 0 26px rgba(84,241,255,.22);
        }
        #pauseOverlaySubtext {
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
        }

    </style>
</head>
<body>
    <canvas id="backgroundCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    <div id="score">0</div>
    <div id="uploadContainer">
        <h2>RGB Grid Rhythm Game</h2>
        <div class="file-upload">
            <span class="file-upload-btn">Choose Local Audio File</span>
            <input type="file" id="audioUpload" accept="audio/*">
        </div>
        <div id="statusText"></div>
        <div style="margin-top: 12px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap;">
            <input id="youtubeUrl" type="url" placeholder="Paste YouTube URL (<= 6 min)" style="width: 320px; padding: 8px; border-radius: 4px; border: 1px solid #19A336; background: #111; color: #fff;">
            <select id="difficultySelect" style="padding:8px; border-radius:4px; border:1px solid #19A336; background:#111; color:#fff;">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
            <select id="playModeSelect" style="padding:8px; border-radius:4px; border:1px solid #19A336; background:#111; color:#fff;">
                <option value="casual" selected>Casual</option>
                <option value="strict">Strict</option>
            </select>
            <button id="analyzeYoutube" style="margin-left:8px;">Prepare Link Mode</button>
        </div>
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
        <button id="startGame" disabled>Start Game</button>
        <button id="cancelAnalyze" disabled>Cancel Analysis</button>
        <button id="pauseGameBtn" disabled>Pause</button>
        <button id="resumeGameBtn" disabled style="display:none;">Resume</button>
    </div>
        
        <div class="note-message" style="margin-top: 20px; font-size: 14px; opacity: 0.8;">
            Tip: Paste a playable link (recommended: YouTube). Video runs in hidden background mode.
        </div>
    </div>

    <div id="pauseOverlay" class="hidden" style="position:fixed;inset:0;z-index:4;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:22px;">
        <div id="pauseOverlayText">Paused</div>
        <div id="pauseOverlaySubtext" style="font-size:14px;opacity:0.8;max-width:420px;text-align:center;">Resume will trigger a short countdown.</div>
            </div>

    <div id="livePlayerHolder" class="hidden">
        <div id="ytPlayer"></div>
        <audio id="liveAudio" playsinline crossorigin="anonymous"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="rgb-effect.js?v=20260307a"></script>
    <script src="default-songs.js?v=20260307a"></script>
    <script src="music-api.js?v=20260307a"></script>
    <script src="game.js?v=20260308b"></script>
    <script src="youtube-client.js?v=20260308a"></script>
</body>
</html>
