<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Liquid Prism</title><style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=IBM+Plex+Sans:wght@400;500;700&display=swap');:root{--bg:#07070b;--ice:#c7f3ff;--vio:#8d7cff;--pink:#ff78bc;--mint:#78ffcb}*{box-sizing:border-box}body{margin:0;font-family:'IBM Plex Sans',sans-serif;color:white;background:radial-gradient(circle at 20% 10%,rgba(141,124,255,.18),transparent 22%),radial-gradient(circle at 80% 20%,rgba(255,120,188,.16),transparent 25%),linear-gradient(180deg,#090913,#05060a)}.page{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;padding:30px}.hero{padding:18px 12px}.kicker{font:700 12px 'Syne',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#c9c1ff}.hero h1{font:800 clamp(48px,8vw,92px) 'Syne',sans-serif;line-height:.88;margin:.12em 0}.hero p{max-width:560px;color:rgba(255,255,255,.72);font-size:18px;line-height:1.6}.panel{position:relative;border-radius:36px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));backdrop-filter:blur(26px);overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.45)}.panel:before{content:"";position:absolute;inset:-20%;background:conic-gradient(from 120deg,rgba(141,124,255,.25),rgba(255,120,188,.2),rgba(120,255,203,.18),rgba(141,124,255,.22));filter:blur(70px)}.stage{position:relative;height:100%;min-height:700px;display:flex;align-items:center;justify-content:center}.blob{position:absolute;border-radius:40% 60% 57% 43%/41% 38% 62% 59%;filter:blur(8px);opacity:.8;animation:float 8s ease-in-out infinite}.b1{width:240px;height:240px;background:rgba(141,124,255,.45);left:7%;top:8%}.b2{width:190px;height:190px;background:rgba(255,120,188,.4);right:10%;top:12%;animation-delay:-2.4s}.b3{width:260px;height:260px;background:rgba(120,255,203,.24);bottom:8%;left:15%;animation-delay:-4.8s}.field{position:relative;width:min(76vh,88%);aspect-ratio:1}.track{position:absolute;left:16%;right:16%;top:51%;height:20px;border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.6),rgba(255,255,255,.1));filter:blur(.2px)}.track:after{content:"";position:absolute;inset:-10px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);border-radius:inherit;animation:sweep 2.2s linear infinite}.orb{position:absolute;width:108px;height:108px;border-radius:50%;display:grid;place-items:center;font:700 30px 'Syne';background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.95),rgba(255,255,255,.18) 32%,rgba(255,255,255,.05) 55%,transparent 62%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.32),0 30px 60px rgba(0,0,0,.3)}.orb:before{content:"";position:absolute;inset:-28px;border-radius:50%;border:1px solid rgba(255,255,255,.26);transform:scale(1.18);opacity:.7}.o1{left:12%;top:20%}.o2{right:10%;top:28%}.o3{left:24%;bottom:16%}.tail{position:absolute;left:46%;top:44%;width:120px;height:120px;border-radius:32px;background:linear-gradient(135deg,rgba(255,120,188,.34),rgba(141,124,255,.1));border:1px solid rgba(255,255,255,.15);transform:rotate(24deg)}.list{display:grid;gap:14px;margin-top:24px}.item{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.item b{display:block;font-size:15px;margin-bottom:4px}.item span{font-size:13px;color:rgba(255,255,255,.65)}@keyframes float{50%{transform:translateY(-18px) scale(1.04)}}@keyframes sweep{from{transform:translateX(-40%)}to{transform:translateX(40%)}}</style></head><body><div class='page'><section class='hero'><div class='kicker'>concept 02 / liquid prism</div><h1>Soft.<br>Reactive.<br>Alive.</h1><p>这套不是电竞 HUD，而是更“音乐流体化”的方向。点击和 hover 不应该只是发光缩圈，而应该像液体折射、玻璃折返、尾迹拉丝。适合想让游戏更高级、更像艺术装置。</p><div class='list'><div class='item'><b>隐藏问题 01</b><span>当前所有 note 材质过于同质，tap / drag / strong beat 缺少材质分层。</span></div><div class='item'><b>隐藏问题 02</b><span>缺少“命中后的残留状态”，玩家击中后空间马上变空，节奏记忆断裂。</span></div><div class='item'><b>隐藏问题 03</b><span>轨道是功能元素，不是视觉主角；应该变成会呼吸、会扫光、会聚焦的舞台装置。</span></div></div></section><section class='panel stage'><div class='blob b1'></div><div class='blob b2'></div><div class='blob b3'></div><div class='field'><div class='track'></div><div class='orb o1'>1</div><div class='orb o2'>2</div><div class='orb o3'>3</div><div class='tail'></div></div></section></div></body></html>
