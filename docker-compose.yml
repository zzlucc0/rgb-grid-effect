services:
  rgb-grid-api:
    build: ./server
    container_name: rgb-grid-api
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./server/data:/app/data
      - ./server/cookies:/app/cookies
    environment:
      - YTDLP_COOKIES_PATH=/app/cookies/youtube.txt
      - LINK_PLAY_ONLY=true
      - ANALYSIS_STRATEGY=auto
      - DEFAULT_CHART_DENSITY=normal
      - FULL_ANALYSIS_MAX_SEC=240
      - SEGMENT_ANALYSIS_THRESHOLD_SEC=240
      - SEGMENT_WINDOW_SEC=60
      - SEGMENT_OVERLAP_SEC=5
      - MAX_CAPTURE_SEC=1200

  rgb-grid-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rgb-grid-web
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - rgb-grid-api
