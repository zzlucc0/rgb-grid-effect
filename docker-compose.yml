services:
  rgb-grid-api:
    build: ./server
    container_name: rgb-grid-api
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./server/data:/app/data
      - ./server/cookies:/app/cookies
    environment:
      - YTDLP_COOKIES_PATH=/app/cookies/youtube.txt

  rgb-grid-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rgb-grid-web
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - rgb-grid-api
